name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Tests + Coverage (80% gate)
        run: npm run test:coverage
        env:
          VITE_DRIVE_FILE_ID: ${{ secrets.VITE_DRIVE_FILE_ID }}
          VITE_DRIVE_API_KEY: ${{ secrets.VITE_DRIVE_API_KEY }}
          VITE_APP_NAME: 'Smart Quote Generator'
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Build
        run: npm run build
        env:
          VITE_DRIVE_FILE_ID: ${{ secrets.VITE_DRIVE_FILE_ID }}
          VITE_DRIVE_API_KEY: ${{ secrets.VITE_DRIVE_API_KEY }}
          VITE_APP_NAME: 'Smart Quote Generator'
          VITE_APP_VERSION: ${{ github.sha }}   # git SHA injected as version (#14)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1
